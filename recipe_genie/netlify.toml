[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

# The static client is in dist/client (publish dir above). The SSR server is a
# universal handler at dist/server/server.js, served by the Netlify Function in
# netlify/functions/server.mjs. We bundle that function with esbuild and include
# the whole dist/server folder so the function can import the handler at runtime.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["dist/server/**"]

# Send every request to the SSR function, but let real static files
# (JS/CSS/assets in dist/client) be served directly first.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false

# Set your secrets in the Netlify UI (Site settings > Environment variables),
# NOT here — this file is committed to git:
#   SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY,
#   AI_API_KEY, AI_GATEWAY_URL, AI_MODEL, JINA_API_KEY
