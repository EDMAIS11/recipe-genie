[build]
  command = "npm run build"
  # Nitro's Netlify preset writes the static client here and turns the SSR
  # server into a Netlify Function automatically when it detects the Netlify
  # build environment. If a deploy fails to find the publish dir, check the
  # build log for the path Nitro reports and adjust this value.
  publish = "dist/client"

[build.environment]
  # Force Nitro's Netlify output preset (it also auto-detects on Netlify CI).
  NITRO_PRESET = "netlify"
  NODE_VERSION = "22"

# Set your secrets in the Netlify UI (Site settings > Environment variables),
# NOT here — this file is committed to git:
#   SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY,
#   AI_API_KEY, AI_GATEWAY_URL, AI_MODEL, FIRECRAWL_API_KEY
